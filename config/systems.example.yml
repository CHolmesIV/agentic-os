# Copy to systems.yml (gitignored). Defines every system the agent may touch
# and the exact boundaries of that access.
systems:
  vps:
    ssh_host: your.vps.hostname
    ssh_user: deploy               # prefer a non-root deploy user
    ssh_key: ~/.ssh/your_deploy_key
    writable_paths:                # agent may write ONLY here
      - /var/www/example.com
    managed_services:              # agent may reload/restart ONLY these
      - name: nginx
        pre_reload_gate: "nginx -t"   # mandatory test before reload
        reload_only: true              # NEVER restart nginx on a shared box — a
                                        # restart drops every other vhost's connections
        tier: 3                       # risk tier 0-4, see SECURITY.md
      - name: form-relay
        tier: 2
    never_touch:                   # explicit off-limits list, checked by adapters
      # List the ACTUAL paths a co-tenant owns — verify they exist on the box,
      # don't guess. A never_touch entry that points at a nonexistent path
      # protects nothing. Include app dirs, nginx confs (both sites-available
      # AND sites-enabled), and backup dirs.
      - /opt/other-production-app
      - /etc/nginx/sites-available/other-app.conf
      - /etc/nginx/sites-enabled/other-app.conf
      - /var/backups/other-app
    never_touch_units: "other-app-*"      # never stop/restart matching systemd units
    never_touch_databases: [other_app_db] # never touch these databases
    disk_ceiling_pct: 85           # refuse deploys above this usage
    disk_floor_gb: 15               # also refuse if free space would drop below this,
                                     # regardless of percentage — protects co-tenants

  dns:
    provider: hostinger
    snapshot_before_write: true    # non-negotiable
    tier: 3                        # every DNS write shows a diff and waits for approval

  telegram:
    allowed_user_ids: [123456789]  # hard allowlist; everyone else is ignored + reported

  budgets:
    per_routine_usd: 0.10
    daily_usd: 3.00
